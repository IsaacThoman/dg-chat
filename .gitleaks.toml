[extend]
useDefault = true

[allowlist]
description = "Known non-secret CI fixture and environment-variable identifiers"
regexTarget = "match"
regexes = [
  '''Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZw==''',
  '''env\.S3_SECRET_KEY''',
  # Historical test idempotency fixture; it is not a credential.
  '''knowledge-api-docs-1''',
  # Historical `.env.example` placeholder from the image-generation branch; never a credential.
  '''replace-with-an-independent-32-byte-secret''',
]
paths = [
  '''\.github/workflows/ci\.yml''',
  '''packages/database/src/object-store\.ts''',
]
