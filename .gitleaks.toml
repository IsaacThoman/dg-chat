[extend]
useDefault = true

[allowlist]
description = "Known non-secret CI fixture and environment-variable identifiers"
regexTarget = "match"
regexes = [
  '''Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZw==''',
  '''env\.S3_SECRET_KEY''',
]
paths = [
  '''\.github/workflows/ci\.yml''',
  '''packages/database/src/object-store\.ts''',
]
