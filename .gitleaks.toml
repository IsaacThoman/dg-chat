[extend]
useDefault = true

[allowlist]
description = "Known non-secret CI fixture and environment-variable identifiers"
regexTarget = "match"
regexes = [
  '''Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZw==''',
  '''env\.S3_SECRET_KEY''',
  # Historical test idempotency fixture; it is not a credential.
  '''knowledge-api-docs-1''',
  # Historical `.env.example` placeholder from the image-generation branch; never a credential.
  '''replace-with-an-independent-32-byte-secret''',
  # Literal base64 encodings of "wrap-nonce" and "wrapped-key" in a synthetic envelope fixture.
  '''d3JhcC1ub25jZQ==''',
  '''d3JhcHBlZC1rZXk=''',
  # Rejected object-key field in the strict DGCHAT schema test; not a credential.
  '''private/bucket/key''',
  # UUID-shaped provider-payload redaction fixture; deliberately synthetic and never a credential.
  '''123E4567-E89B-12D3-A456-426614174000''',
]
paths = [
  '''\.github/workflows/ci\.yml''',
  '''packages/database/src/object-store\.ts''',
]
