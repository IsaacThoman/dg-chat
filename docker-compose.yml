name: dg-chat

x-app-environment: &app-environment
  DENO_ENV: production
  APP_URL: ${APP_URL:-http://localhost:8000}
  WEB_URL: ${WEB_URL:-http://localhost:8000}
  DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-dgchat}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-dgchat}}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  READINESS_TIMEOUT_MS: ${READINESS_TIMEOUT_MS:-2000}
  POSTGRES_READINESS_TIMEOUT_MS: ${POSTGRES_READINESS_TIMEOUT_MS:-}
  REDIS_READINESS_TIMEOUT_MS: ${REDIS_READINESS_TIMEOUT_MS:-}
  S3_READINESS_TIMEOUT_MS: ${S3_READINESS_TIMEOUT_MS:-}
  # The bundled nginx overwrites X-Real-IP with the connecting address.
  TRUST_PROXY_HEADERS: "true"
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_ALLOW_INSECURE: ${S3_ALLOW_INSECURE:-true}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-dg-chat}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
  S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
  ENCRYPTION_KEYRING: ${ENCRYPTION_KEYRING:-}
  ENCRYPTION_PRIMARY_KEY_ID: ${ENCRYPTION_PRIMARY_KEY_ID:-}
  BACKUP_SIGNING_KEY: ${BACKUP_SIGNING_KEY:?BACKUP_SIGNING_KEY is required}
  BACKUP_SIGNING_KEY_ID: ${BACKUP_SIGNING_KEY_ID:-installation-v1}
  ENABLE_PRIVILEGED_SECRET_BACKUPS: ${ENABLE_PRIVILEGED_SECRET_BACKUPS:-false}
  BACKUP_SECRET_KEYRING: ${BACKUP_SECRET_KEYRING:-}
  BACKUP_SECRET_PRIMARY_KEY_ID: ${BACKUP_SECRET_PRIMARY_KEY_ID:-}
  ALLOW_IN_APP_RESTORE: ${ALLOW_IN_APP_RESTORE:-false}
  BACKUP_MAX_UPLOAD_BYTES: ${BACKUP_MAX_UPLOAD_BYTES:-1073741824}
  SETUP_TOKEN: ${SETUP_TOKEN:?SETUP_TOKEN is required}
  DEFAULT_APPROVAL_CREDIT_USD: ${DEFAULT_APPROVAL_CREDIT_USD:-5.00}
  TEMPORARY_CHAT_RETENTION_DAYS: ${TEMPORARY_CHAT_RETENTION_DAYS:-30}
  AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-10}
  AUTH_CLIENT_RATE_LIMIT: ${AUTH_CLIENT_RATE_LIMIT:-100}
  CONVERSATION_SEARCH_RATE_LIMIT: ${CONVERSATION_SEARCH_RATE_LIMIT:-30}
  CONVERSATION_SEARCH_MAX_CONCURRENT: ${CONVERSATION_SEARCH_MAX_CONCURRENT:-4}
  CONVERSATION_SEARCH_MAX_CONCURRENT_PER_USER: ${CONVERSATION_SEARCH_MAX_CONCURRENT_PER_USER:-1}
  CONVERSATION_SEARCH_CONCURRENCY_LEASE_SECONDS: ${CONVERSATION_SEARCH_CONCURRENCY_LEASE_SECONDS:-15}
  UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-26214400}
  UPLOAD_MAX_CONCURRENT: ${UPLOAD_MAX_CONCURRENT:-4}
  UPLOAD_MAX_CONCURRENT_PER_USER: ${UPLOAD_MAX_CONCURRENT_PER_USER:-2}
  AUDIO_MAX_CONCURRENT: ${AUDIO_MAX_CONCURRENT:-4}
  AUDIO_MAX_CONCURRENT_PER_USER: ${AUDIO_MAX_CONCURRENT_PER_USER:-2}
  AUDIO_CONCURRENCY_LEASE_SECONDS: ${AUDIO_CONCURRENCY_LEASE_SECONDS:-120}
  IMAGE_MAX_CONCURRENT: ${IMAGE_MAX_CONCURRENT:-2}
  IMAGE_MAX_CONCURRENT_PER_USER: ${IMAGE_MAX_CONCURRENT_PER_USER:-1}
  IMAGE_URL_SIGNING_SECRET: ${IMAGE_URL_SIGNING_SECRET:-${APP_SECRET}}
  SMTP_URL: ${SMTP_URL:-}
  SMTP_FROM: ${SMTP_FROM:-DG Chat <no-reply@localhost>}
  REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
  OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
  OIDC_ISSUER: ${OIDC_ISSUER:-}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
  OIDC_PROVIDER_ID: ${OIDC_PROVIDER_ID:-organization}
  OIDC_ALLOWED_ALGORITHMS: ${OIDC_ALLOWED_ALGORITHMS:-RS256}
  OIDC_ALLOW_INSECURE_HTTP: ${OIDC_ALLOW_INSECURE_HTTP:-false}
  OIDC_ALLOW_PRIVATE_NETWORK: ${OIDC_ALLOW_PRIVATE_NETWORK:-false}
  OIDC_ALLOWED_ENDPOINT_ORIGINS: ${OIDC_ALLOWED_ENDPOINT_ORIGINS:-}
  KNOWLEDGE_EMBEDDING_BASE_URL: ${KNOWLEDGE_EMBEDDING_BASE_URL:-}
  KNOWLEDGE_EMBEDDING_API_KEY: ${KNOWLEDGE_EMBEDDING_API_KEY:-}
  KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-}
  KNOWLEDGE_EMBEDDING_UPSTREAM_MODEL: ${KNOWLEDGE_EMBEDDING_UPSTREAM_MODEL:-}
  KNOWLEDGE_EMBEDDING_VERSION: ${KNOWLEDGE_EMBEDDING_VERSION:-}
  KNOWLEDGE_EMBEDDING_BATCH_SIZE: ${KNOWLEDGE_EMBEDDING_BATCH_SIZE:-64}
  KNOWLEDGE_EMBEDDING_QUERY_TIMEOUT_MS: ${KNOWLEDGE_EMBEDDING_QUERY_TIMEOUT_MS:-10000}
  KNOWLEDGE_EMBEDDING_INPUT_MICROS_PER_MILLION: ${KNOWLEDGE_EMBEDDING_INPUT_MICROS_PER_MILLION:-0}
  KNOWLEDGE_EMBEDDING_FIXED_CALL_MICROS: ${KNOWLEDGE_EMBEDDING_FIXED_CALL_MICROS:-0}
  SEARXNG_URL: ${SEARXNG_URL:-http://search-proxy:8080}
  SEARXNG_ALLOW_PRIVATE_NETWORK: ${SEARXNG_ALLOW_PRIVATE_NETWORK:-true}
  SEARXNG_TIMEOUT_MS: ${SEARXNG_TIMEOUT_MS:-8000}
  SEARXNG_MAX_RESPONSE_BYTES: ${SEARXNG_MAX_RESPONSE_BYTES:-2000000}
  # Prometheus binds only inside the private backend network. Public nginx keeps /metrics denied.
  METRICS_ENABLED: ${METRICS_ENABLED:-true}
  METRICS_HOST: 0.0.0.0
  METRICS_PORT: ${API_METRICS_PORT:-9090}
  # Native Deno auto-instrumentation includes raw URLs; keep it off and use the bounded SDK spans.
  OTEL_DENO: "false"
  DG_CHAT_OTEL_ENABLED: ${DG_CHAT_OTEL_ENABLED:-false}
  OTEL_SERVICE_NAME: ${OTEL_API_SERVICE_NAME:-dg-chat-api}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.1}

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment: *app-environment
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
  networks:
    - backend
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=${BACKUP_TEMP_STORAGE_SIZE:-2g},mode=1777

services:
  app:
    <<: *app-service
    stop_grace_period: 30s
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    networks:
      - backend
      - app-search
      - egress
    healthcheck:
      test: ["CMD", "busybox", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8000/ready"]
      interval: 10s
      timeout: 35s
      retries: 12
      start_period: 20s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: source
    command: ["task", "db:migrate"]
    environment:
      DENO_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-dgchat}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-dgchat}}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-8000}:8080"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend
      # Docker Desktop does not publish ports for containers attached only to an internal
      # network. Keep proxy-to-app traffic private while exposing nginx through this bridge.
      - egress
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      DENO_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-dgchat}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-dgchat}}
      WORKER_ID: ${WORKER_ID:-worker-compose}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-1000}
      WORKER_JOB_LEASE_SECONDS: ${WORKER_JOB_LEASE_SECONDS:-120}
      WORKER_JOB_DEADLINE_MARGIN_MS: ${WORKER_JOB_DEADLINE_MARGIN_MS:-5000}
      WORKER_DATABASE_RETRY_INITIAL_MS: ${WORKER_DATABASE_RETRY_INITIAL_MS:-250}
      WORKER_DATABASE_RETRY_MAX_MS: ${WORKER_DATABASE_RETRY_MAX_MS:-10000}
      WORKER_DATABASE_RETRY_JITTER_RATIO: ${WORKER_DATABASE_RETRY_JITTER_RATIO:-0.2}
      WORKER_DATABASE_OPERATION_TIMEOUT_MS: ${WORKER_DATABASE_OPERATION_TIMEOUT_MS:-5000}
      WORKER_SHUTDOWN_SETTLEMENT_TIMEOUT_MS: ${WORKER_SHUTDOWN_SETTLEMENT_TIMEOUT_MS:-10000}
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-5000}
      WORKER_HEARTBEAT_STALE_MS: ${WORKER_HEARTBEAT_STALE_MS:-20000}
      WORKER_PROGRESS_STALE_MS: ${WORKER_PROGRESS_STALE_MS:-180000}
      WORKER_HEALTH_TIMEOUT_MS: ${WORKER_HEALTH_TIMEOUT_MS:-4000}
      WORKER_HEALTH_CLOCK_TOLERANCE_MS: ${WORKER_HEALTH_CLOCK_TOLERANCE_MS:-5000}
      WORKER_INSTANCE_RETENTION_HOURS: ${WORKER_INSTANCE_RETENTION_HOURS:-168}
      WORKER_INSTANCE_FILE: ${WORKER_INSTANCE_FILE:-/tmp/dg-chat-worker-instance}
      GENERATED_OBJECT_CLEANUP_GRACE_SECONDS: ${GENERATED_OBJECT_CLEANUP_GRACE_SECONDS:-600}
      GENERATED_OBJECT_CLEANUP_SWEEP_MS: ${GENERATED_OBJECT_CLEANUP_SWEEP_MS:-60000}
      TEMPORARY_CHAT_RETENTION_DAYS: ${TEMPORARY_CHAT_RETENTION_DAYS:-30}
      TEMPORARY_CHAT_PURGE_INTERVAL_SECONDS: ${TEMPORARY_CHAT_PURGE_INTERVAL_SECONDS:-300}
      TEMPORARY_CHAT_PURGE_BATCH_SIZE: ${TEMPORARY_CHAT_PURGE_BATCH_SIZE:-100}
      DOCUMENT_CHUNK_SIZE_CHARS: ${DOCUMENT_CHUNK_SIZE_CHARS:-4000}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-400}
      DOCUMENT_EXTRACTOR_VERSION: ${DOCUMENT_EXTRACTOR_VERSION:-builtin-document-v1}
      DOCUMENT_CHUNKER_VERSION: ${DOCUMENT_CHUNKER_VERSION:-character-window-v1}
      DOCUMENT_EXTRACTION_MAX_RAW_BYTES: ${DOCUMENT_EXTRACTION_MAX_RAW_BYTES:-20971520}
      DOCUMENT_EXTRACTION_TIMEOUT_MS: ${DOCUMENT_EXTRACTION_TIMEOUT_MS:-30000}
      DOCUMENT_EXTRACTION_MAX_OUTPUT_CHARACTERS: ${DOCUMENT_EXTRACTION_MAX_OUTPUT_CHARACTERS:-2000000}
      DOCUMENT_EXTRACTION_MAX_PDF_PAGES: ${DOCUMENT_EXTRACTION_MAX_PDF_PAGES:-1000}
      DOCUMENT_EXTRACTION_MAX_ZIP_ENTRIES: ${DOCUMENT_EXTRACTION_MAX_ZIP_ENTRIES:-2000}
      DOCUMENT_EXTRACTION_MAX_ZIP_ENTRY_BYTES: ${DOCUMENT_EXTRACTION_MAX_ZIP_ENTRY_BYTES:-26214400}
      DOCUMENT_EXTRACTION_MAX_ZIP_EXPANDED_BYTES: ${DOCUMENT_EXTRACTION_MAX_ZIP_EXPANDED_BYTES:-104857600}
      DOCUMENT_EXTRACTION_MAX_ZIP_RATIO: ${DOCUMENT_EXTRACTION_MAX_ZIP_RATIO:-200}
      KNOWLEDGE_EMBEDDING_BASE_URL: ${KNOWLEDGE_EMBEDDING_BASE_URL:-}
      KNOWLEDGE_EMBEDDING_API_KEY: ${KNOWLEDGE_EMBEDDING_API_KEY:-}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-}
      KNOWLEDGE_EMBEDDING_UPSTREAM_MODEL: ${KNOWLEDGE_EMBEDDING_UPSTREAM_MODEL:-}
      KNOWLEDGE_EMBEDDING_VERSION: ${KNOWLEDGE_EMBEDDING_VERSION:-}
      KNOWLEDGE_EMBEDDING_BATCH_SIZE: ${KNOWLEDGE_EMBEDDING_BATCH_SIZE:-64}
      KNOWLEDGE_EMBEDDING_INPUT_MICROS_PER_MILLION: ${KNOWLEDGE_EMBEDDING_INPUT_MICROS_PER_MILLION:-0}
      KNOWLEDGE_EMBEDDING_FIXED_CALL_MICROS: ${KNOWLEDGE_EMBEDDING_FIXED_CALL_MICROS:-0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ALLOW_INSECURE: ${S3_ALLOW_INSECURE:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-dg-chat}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_HOST: 0.0.0.0
      METRICS_PORT: ${WORKER_METRICS_PORT:-9091}
      OTEL_DENO: "false"
      DG_CHAT_OTEL_ENABLED: ${DG_CHAT_OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-dg-chat-worker}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.1}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - backend
      - egress
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    stop_grace_period: 30s

  searxng:
    image: searxng/searxng@sha256:1e9c9535cffd1d9d209985905091308257e23b2f4783fbd3b626c0a56285b80c
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:?SEARXNG_SECRET is required}
      UWSGI_WORKERS: ${SEARXNG_WORKERS:-2}
      UWSGI_THREADS: ${SEARXNG_THREADS:-2}
    volumes:
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - search-backend
      - search-egress
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/cache/searxng:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  search-proxy:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/search-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-search
      - search-backend
    depends_on:
      searxng:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m
      - /var/run:size=4m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dgchat}
      # The official image refuses an empty password at runtime. Keeping interpolation optional
      # lets the managed-dependencies overlay render without credentials for this disabled service.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-dgchat}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      # Deliberately invalid MinIO credentials keep the bundled service fail-closed while allowing
      # the managed overlay to render this profile-disabled service without local secrets.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-x}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-x}
    volumes:
      - minio-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true

  minio-init:
    restart: "no"
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
          mc --config-dir /tmp/.mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
          mc --config-dir /tmp/.mc mb --ignore-existing "local/$${S3_BUCKET}"
          mc --config-dir /tmp/.mc anonymous set none "local/$${S3_BUCKET}"
          cat > /tmp/dg-chat-app-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["s3:GetBucketLocation", "s3:ListBucket"],
                "Resource": ["arn:aws:s3:::$${S3_BUCKET}"]
              },
              {
                "Effect": "Allow",
                "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
                "Resource": ["arn:aws:s3:::$${S3_BUCKET}/*"]
              }
            ]
          }
          EOF
          policy_name="$${MINIO_APP_POLICY_NAME:-dg-chat-$${S3_ACCESS_KEY}}"
          mc --config-dir /tmp/.mc admin user add local "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}"
          mc --config-dir /tmp/.mc admin policy create local "$${policy_name}" /tmp/dg-chat-app-policy.json
          mc --config-dir /tmp/.mc admin policy attach local "$${policy_name}" --user "$${S3_ACCESS_KEY}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-x}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-x}
      S3_BUCKET: ${S3_BUCKET:-dg-chat}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      MINIO_APP_POLICY_NAME: ${MINIO_APP_POLICY_NAME:-}
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - backend
      - egress
    depends_on:
      app:
        condition: service_healthy
      worker:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  backend:
    driver: bridge
    internal: true
  search-egress:
    driver: bridge
  app-search:
    driver: bridge
    internal: true
  search-backend:
    driver: bridge
    internal: true
  egress:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
