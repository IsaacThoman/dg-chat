name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  S3_ACCESS_KEY: ci-dgchat
  BACKUP_SIGNING_KEY: Y2ktYmFja3VwLXNpZ25pbmcta2V5LTMyLWJ5dGVzISE=
  S3_SECRET_KEY: ci-dgchat-application-secret
  SEARXNG_SECRET: ci-searxng-secret-at-least-thirty-two-bytes

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Check formatting, lint, and types
        run: deno task check
      - name: Unit and integration tests
        run: deno task test
      - name: Web unit tests
        run: deno task test:web
      - name: E2E harness policy tests
        run: |
          deno test tests/e2e/env_test.ts tests/e2e/target-safety_test.ts \
            tests/run-postgres-test-group_test.ts --allow-env
          bash tests/assert-compose-graceful-restart_test.sh
      - name: Production web build
        run: deno task build
      - name: Validate Compose model
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password
          APP_SECRET: ci-app-secret-at-least-thirty-two-bytes
          ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZyE=
          SETUP_TOKEN: e2e-setup-token
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.oidc.yml config --quiet
          dev_model="$(docker compose -f docker-compose.yml -f docker-compose.dev.yml config --format json)"
          ci_model="$(docker compose -f docker-compose.yml -f docker-compose.ci.yml config --format json)"
          contract_model="$(docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml config --format json)"
          oidc_model="$(docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.oidc.yml config --format json)"
          default_model="$(env -u DATABASE_URL -u REDIS_URL docker compose -f docker-compose.yml config --format json)"
          external_database_url='postgresql://external-db.example/dgchat?sslmode=require'
          external_redis_url='rediss://external-redis.example:6380/4'
          external_model="$(DATABASE_URL="$external_database_url" REDIS_URL="$external_redis_url" docker compose -f docker-compose.yml config --format json)"
          hostile_host_database_url='postgresql://host:host@localhost:5432/host'
          hostile_host_redis_url='redis://localhost:6379/9'
          hostile_host_s3_endpoint='http://localhost:9000'
          dev_dns_model="$(DATABASE_URL="$hostile_host_database_url" REDIS_URL="$hostile_host_redis_url" S3_ENDPOINT="$hostile_host_s3_endpoint" docker compose -f docker-compose.yml -f docker-compose.dev.yml config --format json)"
          managed_s3_endpoint='https://objects.example'
          managed_model="$(env -u POSTGRES_PASSWORD -u MINIO_ROOT_USER -u MINIO_ROOT_PASSWORD DATABASE_URL="$external_database_url" REDIS_URL="$external_redis_url" S3_ENDPOINT="$managed_s3_endpoint" S3_ALLOW_INSECURE=false docker compose -f docker-compose.yml -f docker-compose.managed.yml config --format json)"
          managed_profiles="$(env -u POSTGRES_PASSWORD -u MINIO_ROOT_USER -u MINIO_ROOT_PASSWORD DATABASE_URL="$external_database_url" REDIS_URL="$external_redis_url" S3_ENDPOINT="$managed_s3_endpoint" docker compose -f docker-compose.yml -f docker-compose.managed.yml config --profiles)"
          jq -e '
            (.services.web.ports | length) == 1 and
            .services.web.ports[0].target == 5173 and
            .services.web.ports[0].published == "5173" and
            .services.web.ports[0].host_ip == "127.0.0.1" and
            (.services.app.ports | length) == 1 and
            .services.app.ports[0].target == 8000 and
            .services.app.ports[0].published == "8000" and
            .services.app.ports[0].host_ip == "127.0.0.1" and
            .services.app.environment.AUTH_RATE_LIMIT == "10" and
            .services.app.environment.AUTH_CLIENT_RATE_LIMIT == "100" and
            .services.app.environment.CONVERSATION_SEARCH_RATE_LIMIT == "30" and
            .services.app.environment.CONVERSATION_SEARCH_MAX_CONCURRENT == "4" and
            .services.app.environment.CONVERSATION_SEARCH_MAX_CONCURRENT_PER_USER == "1" and
            .services.app.environment.CONVERSATION_SEARCH_CONCURRENCY_LEASE_SECONDS == "15" and
            .services.app.environment.UPLOAD_MAX_BYTES == "26214400" and
            .services.app.environment.UPLOAD_MAX_CONCURRENT == "4" and
            .services.app.environment.UPLOAD_MAX_CONCURRENT_PER_USER == "2" and
            .services.worker.command == ["task", "--filter", "@dg-chat/worker", "start"] and
            .services.worker.environment.WORKER_DATABASE_RETRY_INITIAL_MS == "250" and
            .services.worker.environment.WORKER_DATABASE_RETRY_MAX_MS == "10000" and
            (.networks["dev-host"].internal != true) and
            (.services.postgres.networks | has("dev-host")) and
            (.services.redis.networks | has("dev-host")) and
            (.services.minio.networks | has("dev-host")) and
            (.services.postgres.ports | length) == 1 and
            .services.postgres.ports[0].target == 5432 and
            .services.postgres.ports[0].published == "5432" and
            .services.postgres.ports[0].host_ip == "127.0.0.1" and
            (.services.redis.ports | length) == 1 and
            .services.redis.ports[0].target == 6379 and
            .services.redis.ports[0].published == "6379" and
            .services.redis.ports[0].host_ip == "127.0.0.1" and
            (.services.minio.ports | length) == 2 and
            ([.services.minio.ports[].target] | sort) == [9000, 9001] and
            ([.services.minio.ports[].published] | sort) == ["9000", "9001"] and
            all(.services.minio.ports[]; .host_ip == "127.0.0.1")
          ' <<<"$dev_model"
          jq -e '
            .services.app.environment.AUTH_RATE_LIMIT == "1000" and
            .services.app.environment.AUTH_CLIENT_RATE_LIMIT == "1000"
          ' <<<"$ci_model"
          jq -e '.services["mock-provider"].restart == "unless-stopped"' <<<"$contract_model"
          jq -e '
            (.services["mock-oidc"].ports | length) == 1 and
            .services["mock-oidc"].ports[0].target == 4020 and
            .services["mock-oidc"].ports[0].published == "4020" and
            .services["mock-oidc"].ports[0].host_ip == "127.0.0.1" and
            .services["mock-oidc"].restart == "unless-stopped"
          ' <<<"$oidc_model"
          jq -e '
            .services.app.environment.DATABASE_URL == .services.migrate.environment.DATABASE_URL and
            .services.app.environment.DATABASE_URL == .services.worker.environment.DATABASE_URL and
            .services.app.environment.REDIS_URL == "redis://redis:6379" and
            (.services.app.environment.DATABASE_URL | contains("@postgres:5432/"))
          ' <<<"$default_model"
          jq -e --arg database "$external_database_url" --arg redis "$external_redis_url" '
            .services.app.environment.DATABASE_URL == $database and
            .services.migrate.environment.DATABASE_URL == $database and
            .services.worker.environment.DATABASE_URL == $database and
            .services.app.environment.REDIS_URL == $redis
          ' <<<"$external_model"
          jq -e '
            .services.app.environment.DATABASE_URL == "postgresql://dgchat:ci-postgres-password@postgres:5432/dgchat" and
            .services.migrate.environment.DATABASE_URL == .services.app.environment.DATABASE_URL and
            .services.worker.environment.DATABASE_URL == .services.app.environment.DATABASE_URL and
            .services.app.environment.REDIS_URL == "redis://redis:6379" and
            .services.app.environment.S3_ENDPOINT == "http://minio:9000" and
            .services.worker.environment.S3_ENDPOINT == "http://minio:9000"
          ' <<<"$dev_dns_model"
          jq -e --arg database "$external_database_url" --arg redis "$external_redis_url" --arg s3 "$managed_s3_endpoint" '
            .services.app.environment.DATABASE_URL == $database and
            .services.migrate.environment.DATABASE_URL == $database and
            .services.worker.environment.DATABASE_URL == $database and
            .services.app.environment.REDIS_URL == $redis and
            .services.app.environment.S3_ENDPOINT == $s3 and
            .services.worker.environment.S3_ENDPOINT == $s3 and
            (.services.app.depends_on | keys) == ["migrate"] and
            (.services.worker.depends_on | keys) == ["migrate"] and
            .services.migrate.depends_on == null and
            (.services.migrate.networks | has("egress")) and
            (.services | has("postgres") | not) and
            (.services | has("redis") | not) and
            (.services | has("minio") | not) and
            (.services | has("minio-init") | not)
          ' <<<"$managed_model"
          grep -qx 'bundled-dependencies' <<<"$managed_profiles"
          if env -u DATABASE_URL -u POSTGRES_PASSWORD -u MINIO_ROOT_USER -u MINIO_ROOT_PASSWORD \
            REDIS_URL="$external_redis_url" S3_ENDPOINT="$managed_s3_endpoint" \
            docker compose -f docker-compose.yml -f docker-compose.managed.yml config --quiet \
            >/dev/null 2>&1; then
            echo "managed Compose unexpectedly accepted a missing DATABASE_URL" >&2
            exit 1
          fi
          test "$(docker compose -f docker-compose.yml config --format json | jq -r '.services.app.environment.DENO_ENV')" = production
          test "$(docker compose -f docker-compose.yml -f docker-compose.ci.yml config --format json | jq -r '.services.app.environment.DENO_ENV')" = test
      - name: Validate Prometheus configuration and alert rules
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "$PWD/deploy/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.5.0 \
            check config /etc/prometheus/prometheus.yml
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "$PWD/deploy/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.5.0 \
            check rules /etc/prometheus/alerts.yml
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "$PWD/deploy/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.5.0 \
            test rules /etc/prometheus/alerts_test.yml

  redis-integration:
    name: Redis rate limit, circuit breaker, and concurrency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Run distributed Redis integration tests
        run: >-
          deno test
          apps/api/src/rate_limit_redis_test.ts
          apps/api/src/provider_circuit_test.ts
          apps/api/src/audio_concurrency_redis_test.ts
          --allow-env --allow-net

  postgres-integration:
    name: PostgreSQL integration and concurrency
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: dgchat
          POSTGRES_PASSWORD: integration-password
          POSTGRES_DB: dgchat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dgchat -d dgchat_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://dgchat:integration-password@localhost:5432/dgchat_test
      TEST_DATABASE_URL: postgresql://dgchat:integration-password@localhost:5432/dgchat_test
      DG_CHAT_ALLOW_DESTRUCTIVE_TEST_DATABASES: "true"
      POSTGRES_TEST_DATABASE_PREFIX: dgchat_ci_${{ github.run_id }}_${{ github.run_attempt }}_
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Prepare freshly migrated test template
        run: >-
          deno run --allow-env --allow-net --allow-run
          tests/run-postgres-test-group.ts --prepare-template
      - name: Prove destructive database ownership fencing
        run: >-
          deno test tests/run-postgres-test-group_ownership_postgres_test.ts
          --allow-env --allow-net --allow-read --allow-run
      - name: Run isolated database, API, and worker integration tests sequentially
        run: |
          discover_postgres_tests() {
            local root="$1"
            grep --recursive --files-with-matches --include='*_test.ts' \
              'TEST_DATABASE_URL' "$root" | sort
          }

          mapfile -t database_tests < <(discover_postgres_tests packages/database/src)
          mapfile -t api_tests < <(
            discover_postgres_tests apps/api/src \
              | grep --invert-match 'backup_stack_postgres_s3_test.ts$'
          )
          mapfile -t worker_tests < <(discover_postgres_tests apps/worker/src)
          ((${#database_tests[@]} > 0))
          ((${#api_tests[@]} > 0))
          ((${#worker_tests[@]} > 0))

          index=0
          for test_file in "${database_tests[@]}"; do
            index=$((index + 1))
            printf -v group 'db_test_%03d' "$index"
            deno run --allow-env --allow-net --allow-run tests/run-postgres-test-group.ts \
              "$group" deno test "$test_file" \
              --allow-env --allow-net --allow-read --allow-write
          done

          for test_file in "${api_tests[@]}"; do
            index=$((index + 1))
            printf -v group 'api_test_%03d' "$index"
            deno run --allow-env --allow-net --allow-run tests/run-postgres-test-group.ts \
              "$group" deno test "$test_file" \
              --allow-env --allow-net --allow-read --allow-write
          done

          for test_file in "${worker_tests[@]}"; do
            index=$((index + 1))
            printf -v group 'worker_test_%03d' "$index"
            deno run --allow-env --allow-net --allow-run tests/run-postgres-test-group.ts \
              "$group" deno test --unstable-worker-options "$test_file" \
              --allow-env --allow-net --allow-read --allow-write --allow-run
          done
      - name: Remove isolated database template
        if: always()
        run: >-
          deno run --allow-env --allow-net --allow-run
          tests/run-postgres-test-group.ts --cleanup-template

  backup-stack-integration:
    name: PostgreSQL and S3 backup roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: dgchat
          POSTGRES_PASSWORD: backup-integration-password
          POSTGRES_DB: dgchat_backup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dgchat -d dgchat_backup_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://dgchat:backup-integration-password@localhost:5432/dgchat_backup_test
      TEST_DATABASE_URL: postgresql://dgchat:backup-integration-password@localhost:5432/dgchat_backup_test
      TEST_S3_ENDPOINT: http://127.0.0.1:9000
      TEST_S3_REGION: us-east-1
      TEST_S3_BUCKET: dg-chat-backup-test
      TEST_S3_ACCESS_KEY: backup-integration-user
      TEST_S3_SECRET_KEY: backup-integration-password-123
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Start isolated MinIO
        run: |
          docker run --detach --name backup-integration-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="$TEST_S3_ACCESS_KEY" \
            --env MINIO_ROOT_PASSWORD="$TEST_S3_SECRET_KEY" \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data
          for _attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs backup-integration-minio
          exit 1
      - name: Create isolated test bucket
        run: |
          deno eval '
            import { CreateBucketCommand, S3Client } from "@aws-sdk/client-s3";
            const client = new S3Client({
              endpoint: Deno.env.get("TEST_S3_ENDPOINT"),
              region: Deno.env.get("TEST_S3_REGION"),
              forcePathStyle: true,
              credentials: {
                accessKeyId: Deno.env.get("TEST_S3_ACCESS_KEY"),
                secretAccessKey: Deno.env.get("TEST_S3_SECRET_KEY"),
              },
            });
            await client.send(new CreateBucketCommand({ Bucket: Deno.env.get("TEST_S3_BUCKET") }));
            client.destroy();
          '
      - name: Apply migrations
        run: deno task db:migrate
      - name: Run production backup stack roundtrip
        run: >-
          deno test apps/api/src/backup_stack_postgres_s3_test.ts
          --allow-env --allow-net --allow-read --allow-write --allow-sys
      - name: Capture MinIO logs
        if: failure()
        run: docker logs backup-integration-minio > backup-integration-minio.log 2>&1 || true
      - name: Upload MinIO logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backup-integration-minio-log
          path: backup-integration-minio.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop isolated MinIO
        if: always()
        run: docker rm --force backup-integration-minio >/dev/null 2>&1 || true

  containers:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [app, web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  production-compose-smoke:
    name: Production Compose startup and graceful restart
    runs-on: ubuntu-latest
    needs: [containers]
    timeout-minutes: 30
    env:
      COMPOSE_PROJECT_NAME: dg-chat-production-smoke
      POSTGRES_PASSWORD: production-smoke-postgres-password
      MINIO_ROOT_USER: production-smoke-minio-user
      MINIO_ROOT_PASSWORD: production-smoke-minio-password
      APP_SECRET: production-smoke-app-secret-at-least-thirty-two-bytes
      ENCRYPTION_KEY: cHJvZHVjdGlvbi1zbW9rZS1lbmNyeXB0aW9uLWtleSE=
      BACKUP_SIGNING_KEY: QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=
      SETUP_TOKEN: production-smoke-setup-token
      S3_ACCESS_KEY: production-smoke-minio-user
      S3_SECRET_KEY: production-smoke-minio-password
      SEARXNG_SECRET: production-smoke-searxng-secret
      WEB_HOST_PORT: "8000"
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Start monitoring before application containers
        run: |
          docker compose --profile observability up -d prometheus
          for _attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:9090/-/ready >/dev/null; then
              break
            fi
            sleep 2
          done
          curl --fail --silent --show-error http://127.0.0.1:9090/-/ready >/dev/null
          for job in dg-chat-api dg-chat-worker; do
            payload="$(
              curl --fail --silent --show-error --get \
                --data-urlencode "query=absent(up{job=\"$job\"})" \
                http://127.0.0.1:9090/api/v1/query
            )"
            test "$(jq -r '.data.result[0].value[1] // empty' <<<"$payload")" = 1
          done
      - name: Start fresh production stack
        run: docker compose -f docker-compose.yml up -d --build
      - name: Assert production startup and health
        run: |
          deno run --allow-net tests/wait-for-ready.ts http://localhost:8000/ready 180000
          bash tests/assert-compose-health.sh -f docker-compose.yml
          app_id="$(docker compose -f docker-compose.yml ps --quiet app)"
          worker_id="$(docker compose -f docker-compose.yml ps --quiet worker)"
          test "$(docker inspect --format '{{range .Config.Env}}{{if eq . "DENO_ENV=production"}}true{{end}}{{end}}' "$app_id")" = true
          test "$(docker inspect --format '{{range .Config.Env}}{{if eq . "DENO_ENV=production"}}true{{end}}{{end}}' "$worker_id")" = true
      - name: Assert bounded graceful stop and restart
        run: |
          bash tests/assert-compose-graceful-restart.sh -f docker-compose.yml
          deno run --allow-net tests/wait-for-ready.ts http://localhost:8000/ready 180000
          bash tests/assert-compose-health.sh -f docker-compose.yml
      - name: Assert scaled observability profile
        run: bash tests/assert-observability-profile.sh -f docker-compose.yml
      - name: Capture production service logs
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color > compose-production-smoke.log
      - name: Upload production service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-production-smoke-log
          path: compose-production-smoke.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop production stack
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans

  openai-contracts:
    name: Official OpenAI SDK contracts
    runs-on: ubuntu-latest
    needs: [quality, containers, postgres-integration, production-compose-smoke]
    timeout-minutes: 30
    env:
      POSTGRES_PASSWORD: contract-postgres-password
      MINIO_ROOT_USER: contract-minio-user
      MINIO_ROOT_PASSWORD: contract-minio-password
      APP_SECRET: contract-app-secret-at-least-thirty-two-bytes
      ENCRYPTION_KEY: Y29udHJhY3QtZW5jcnlwdGlvbi1rZXktMzItYnl0ZXM=
      SETUP_TOKEN: contract-setup-token
      CONTRACT_API_URL: http://localhost:8000
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Start disposable stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml up -d --build
      - name: Wait for readiness
        run: deno run --allow-net tests/wait-for-ready.ts http://localhost:8000/ready 180000
      - name: Assert migration-safe worker startup
        run: bash tests/assert-compose-health.sh -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml
      - name: Run official SDK and upstream streaming contracts
        run: bash tests/run-openai-contracts.sh
      - name: Capture service logs
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml logs --no-color > compose-contracts.log
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml exec -T mock-provider \
            deno eval 'fetch("http://127.0.0.1:4010/__test/state", {headers:{authorization:"Bearer ci-mock-control-token"}}).then(async r => { console.log(await r.text()); if (!r.ok) Deno.exit(1); })' \
            > mock-provider-state.json || true
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-contract-logs
          path: |
            compose-contracts.log
            mock-provider-state.json
          retention-days: 7
      - name: Stop disposable stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml down -v --remove-orphans

  e2e:
    name: Browser tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [quality, containers, postgres-integration, production-compose-smoke]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chromium]
    env:
      # Matrix jobs run on separate GitHub runners. An explicit Compose project name also keeps
      # every database, object bucket, network, and volume scoped to its browser project.
      COMPOSE_PROJECT_NAME: dg-chat-e2e-${{ matrix.project }}
      POSTGRES_PASSWORD: ci-postgres-password
      MINIO_ROOT_USER: ci-minio-user
      MINIO_ROOT_PASSWORD: ci-minio-password
      APP_SECRET: ci-app-secret-at-least-thirty-two-bytes
      ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZyE=
      SETUP_TOKEN: e2e-setup-token
      E2E_BASE_URL: http://localhost:8000
      E2E_API_URL: http://localhost:8000
      E2E_ADMIN_EMAIL: admin-${{ matrix.project }}@e2e.invalid
      E2E_ADMIN_PASSWORD: Correct-Horse-42-Battery!
      DEFAULT_APPROVAL_CREDIT_USD: "6.75"
      E2E_KNOWLEDGE_EMBEDDINGS: "true"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install test dependencies
        run: deno install --frozen
      - name: Start disposable stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml -f docker-compose.oidc.yml up -d --build
      - name: Wait for readiness
        run: deno run --allow-net tests/wait-for-ready.ts http://localhost:8000/ready 180000
      - name: Assert migration-safe worker startup
        run: bash tests/assert-compose-health.sh -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml -f docker-compose.oidc.yml
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npx playwright test --project=${{ matrix.project }}
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Capture service logs
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml -f docker-compose.oidc.yml logs --no-color > compose.log
          curl --fail --silent --show-error \
            -H 'Authorization: Bearer ci-mock-oidc-control-token' \
            http://localhost:4020/control/state > mock-oidc-state.json || true
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs-${{ matrix.project }}
          path: |
            compose.log
            mock-oidc-state.json
          retention-days: 7
      - name: Stop disposable stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml -f docker-compose.oidc.yml down -v --remove-orphans
