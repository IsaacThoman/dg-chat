name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen=false
      - name: Check formatting, lint, and types
        run: deno task check
      - name: Unit and integration tests
        run: deno task test
      - name: Production web build
        run: deno task build
      - name: Validate Compose model
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password
          APP_SECRET: ci-app-secret-at-least-thirty-two-bytes
          ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZw==
          SETUP_TOKEN: e2e-setup-token
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml config --quiet

  containers:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [app, web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  e2e:
    name: Browser and contract tests
    runs-on: ubuntu-latest
    needs: [quality, containers]
    timeout-minutes: 30
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      MINIO_ROOT_USER: ci-minio-user
      MINIO_ROOT_PASSWORD: ci-minio-password
      APP_SECRET: ci-app-secret-at-least-thirty-two-bytes
      ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZw==
      SETUP_TOKEN: e2e-setup-token
      E2E_BASE_URL: http://localhost:8000
      E2E_API_URL: http://localhost:8000
      E2E_ADMIN_EMAIL: admin@e2e.invalid
      E2E_ADMIN_PASSWORD: Correct-Horse-42-Battery!
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Start disposable stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
      - name: Wait for readiness
        run: deno run --allow-net tests/wait-for-ready.ts http://localhost:8000/ready 180000
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npx playwright test
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Capture service logs
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > compose.log
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose.log
          retention-days: 7
      - name: Stop disposable stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans
