name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  S3_ACCESS_KEY: ci-dgchat
  BACKUP_SIGNING_KEY: Y2ktYmFja3VwLXNpZ25pbmcta2V5LTMyLWJ5dGVzISE=
  S3_SECRET_KEY: ci-dgchat-application-secret
  SEARXNG_SECRET: ci-searxng-secret-at-least-thirty-two-bytes

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Check formatting, lint, and types
        run: deno task check
      - name: Unit and integration tests
        run: deno task test
      - name: Web unit tests
        run: deno task test:web
      - name: Production web build
        run: deno task build
      - name: Validate Compose model
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password
          APP_SECRET: ci-app-secret-at-least-thirty-two-bytes
          ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZyE=
          SETUP_TOKEN: e2e-setup-token
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.oidc.yml config --quiet
          test "$(docker compose -f docker-compose.yml config --format json | jq -r '.services.app.environment.DENO_ENV')" = production
          test "$(docker compose -f docker-compose.yml -f docker-compose.ci.yml config --format json | jq -r '.services.app.environment.DENO_ENV')" = test

  postgres-integration:
    name: PostgreSQL integration and concurrency
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: dgchat
          POSTGRES_PASSWORD: integration-password
          POSTGRES_DB: dgchat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dgchat -d dgchat_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://dgchat:integration-password@localhost:5432/dgchat_test
      TEST_DATABASE_URL: postgresql://dgchat:integration-password@localhost:5432/dgchat_test
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Apply migrations
        run: deno task db:migrate
      - name: Run database integration, concurrency, and backfill tests
        run: |
          deno test packages/database \
            --ignore=packages/database/src/backup_restore_migration_test.ts \
            --ignore=packages/database/src/backup_postgres_test.ts \
            --ignore=packages/database/src/backup_data_postgres_test.ts \
            --allow-env --allow-net --allow-read --allow-write
          deno test packages/database/src/backup_restore_migration_test.ts \
            --allow-env --allow-net --allow-read --allow-write
          deno test packages/database/src/backup_postgres_test.ts \
            --allow-env --allow-net --allow-read --allow-write
          deno test packages/database/src/backup_data_postgres_test.ts \
            --allow-env --allow-net --allow-read --allow-write
          deno test apps/api/src/better_auth_postgres_test.ts --allow-env --allow-net --allow-read --allow-write
          deno test apps/api/src/knowledge_context_postgres_test.ts --allow-env --allow-net --allow-read --allow-write
          deno test apps/api/src/tool-execution_postgres_test.ts --allow-env --allow-net --allow-read --allow-write
          deno test --unstable-worker-options apps/worker --allow-env --allow-net --allow-read --allow-write --allow-run

  backup-stack-integration:
    name: PostgreSQL and S3 backup roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: dgchat
          POSTGRES_PASSWORD: backup-integration-password
          POSTGRES_DB: dgchat_backup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dgchat -d dgchat_backup_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://dgchat:backup-integration-password@localhost:5432/dgchat_backup_test
      TEST_DATABASE_URL: postgresql://dgchat:backup-integration-password@localhost:5432/dgchat_backup_test
      TEST_S3_ENDPOINT: http://127.0.0.1:9000
      TEST_S3_REGION: us-east-1
      TEST_S3_BUCKET: dg-chat-backup-test
      TEST_S3_ACCESS_KEY: backup-integration-user
      TEST_S3_SECRET_KEY: backup-integration-password-123
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Start isolated MinIO
        run: |
          docker run --detach --name backup-integration-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="$TEST_S3_ACCESS_KEY" \
            --env MINIO_ROOT_PASSWORD="$TEST_S3_SECRET_KEY" \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs backup-integration-minio
          exit 1
      - name: Create isolated test bucket
        run: |
          deno eval '
            import { CreateBucketCommand, S3Client } from "@aws-sdk/client-s3";
            const client = new S3Client({
              endpoint: Deno.env.get("TEST_S3_ENDPOINT"),
              region: Deno.env.get("TEST_S3_REGION"),
              forcePathStyle: true,
              credentials: {
                accessKeyId: Deno.env.get("TEST_S3_ACCESS_KEY"),
                secretAccessKey: Deno.env.get("TEST_S3_SECRET_KEY"),
              },
            });
            await client.send(new CreateBucketCommand({ Bucket: Deno.env.get("TEST_S3_BUCKET") }));
            client.destroy();
          '
      - name: Apply migrations
        run: deno task db:migrate
      - name: Run production backup stack roundtrip
        run: >-
          deno test apps/api/src/backup_stack_postgres_s3_test.ts
          --allow-env --allow-net --allow-read --allow-write --allow-sys
      - name: Capture MinIO logs
        if: failure()
        run: docker logs backup-integration-minio > backup-integration-minio.log 2>&1 || true
      - name: Upload MinIO logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backup-integration-minio-log
          path: backup-integration-minio.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop isolated MinIO
        if: always()
        run: docker rm --force backup-integration-minio >/dev/null 2>&1 || true

  containers:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [app, web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  openai-contracts:
    name: Official OpenAI SDK contracts
    runs-on: ubuntu-latest
    needs: [quality, containers, postgres-integration]
    timeout-minutes: 30
    env:
      POSTGRES_PASSWORD: contract-postgres-password
      MINIO_ROOT_USER: contract-minio-user
      MINIO_ROOT_PASSWORD: contract-minio-password
      APP_SECRET: contract-app-secret-at-least-thirty-two-bytes
      ENCRYPTION_KEY: Y29udHJhY3QtZW5jcnlwdGlvbi1rZXktMzItYnl0ZXM=
      SETUP_TOKEN: contract-setup-token
      CONTRACT_API_URL: http://localhost:8000
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Start disposable stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml up -d --build
      - name: Wait for readiness
        run: deno run --allow-net tests/wait-for-ready.ts http://localhost:8000/ready 180000
      - name: Assert migration-safe worker startup
        run: bash tests/assert-compose-health.sh -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml
      - name: Run official SDK and upstream streaming contracts
        run: bash tests/run-openai-contracts.sh
      - name: Capture service logs
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml logs --no-color > compose-contracts.log
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml exec -T mock-provider \
            deno eval 'fetch("http://127.0.0.1:4010/__test/state", {headers:{authorization:"Bearer ci-mock-control-token"}}).then(async r => { console.log(await r.text()); if (!r.ok) Deno.exit(1); })' \
            > mock-provider-state.json || true
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-contract-logs
          path: |
            compose-contracts.log
            mock-provider-state.json
          retention-days: 7
      - name: Stop disposable stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.contracts.yml down -v --remove-orphans

  e2e:
    name: Browser tests
    runs-on: ubuntu-latest
    needs: [quality, containers, postgres-integration]
    timeout-minutes: 30
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      MINIO_ROOT_USER: ci-minio-user
      MINIO_ROOT_PASSWORD: ci-minio-password
      APP_SECRET: ci-app-secret-at-least-thirty-two-bytes
      ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMtbG9uZyE=
      SETUP_TOKEN: e2e-setup-token
      E2E_BASE_URL: http://localhost:8000
      E2E_API_URL: http://localhost:8000
      E2E_ADMIN_EMAIL: admin@e2e.invalid
      E2E_ADMIN_PASSWORD: Correct-Horse-42-Battery!
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install test dependencies
        run: deno install --frozen
      - name: Start disposable stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.oidc.yml up -d --build
      - name: Wait for readiness
        run: deno run --allow-net tests/wait-for-ready.ts http://localhost:8000/ready 180000
      - name: Assert migration-safe worker startup
        run: bash tests/assert-compose-health.sh -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.oidc.yml
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npx playwright test
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Capture service logs
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.oidc.yml logs --no-color > compose.log
          curl --fail --silent --show-error \
            -H 'Authorization: Bearer ci-mock-oidc-control-token' \
            http://localhost:4020/control/state > mock-oidc-state.json || true
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: |
            compose.log
            mock-oidc-state.json
          retention-days: 7
      - name: Stop disposable stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.oidc.yml down -v --remove-orphans
