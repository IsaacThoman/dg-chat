name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    name: Secrets, dependencies, and filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Secret scan
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.2 detect --source /repo --config /repo/.gitleaks.toml --no-banner --redact
      - name: Dependency vulnerability scan
        run: deno audit --level=high --ignore-unfixable
      - name: Filesystem vulnerability and misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  image:
    name: Image scan and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          load: true
          tags: dg-chat:security-scan
          cache-from: type=gha,scope=security-app
          cache-to: type=gha,mode=max,scope=security-app
      - name: Scan application image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: dg-chat:security-scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload scan results
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: dg-chat:security-scan
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: dg-chat-sbom
          path: sbom.cdx.json
          retention-days: 30
