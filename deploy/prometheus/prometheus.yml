global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    installation: dg-chat

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: dg-chat-api
    metrics_path: /metrics
    # Docker's embedded DNS returns one A record per scaled Compose replica. DNS discovery expands
    # those addresses into independent scrape targets instead of load-balancing one static target.
    dns_sd_configs:
      - names: ["api-metrics"]
        type: A
        port: 9090
        refresh_interval: 15s
  - job_name: dg-chat-worker
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["worker-metrics"]
        type: A
        port: 9091
        refresh_interval: 15s
