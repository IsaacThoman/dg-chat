global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    installation: dg-chat

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: dg-chat-api
    metrics_path: /metrics
    static_configs:
      - targets: ["app:9090"]
  - job_name: dg-chat-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9091"]
