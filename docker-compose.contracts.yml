services:
  app:
    environment:
      DENO_ENV: test
      OPENAI_BASE_URL: http://mock-provider:4010/v1
      OPENAI_API_KEY: ci-mock-provider-key
      OPENAI_ALLOWED_MODELS: mock-fast,mock-split,mock-error,mock-role-stall
      # This exact-name exception is honored only in DENO_ENV=test.
      OPENAI_TEST_ALLOW_HTTP_HOST: mock-provider
      KNOWLEDGE_EMBEDDING_BASE_URL: http://mock-provider:4010/v1
      KNOWLEDGE_EMBEDDING_API_KEY: ci-mock-provider-key
      KNOWLEDGE_EMBEDDING_MODEL: mock-embedding
      KNOWLEDGE_EMBEDDING_UPSTREAM_MODEL: mock-embedding
      KNOWLEDGE_EMBEDDING_VERSION: mock-embedding-v1
      KNOWLEDGE_EMBEDDING_QUERY_TIMEOUT_MS: "10000"
      KNOWLEDGE_EMBEDDING_INPUT_MICROS_PER_MILLION: "1000000"
      KNOWLEDGE_EMBEDDING_FIXED_CALL_MICROS: "5"
      # The contract job intentionally runs both official SDK suites back-to-back.
      OPENAI_RATE_LIMIT: 1000
      GENERATION_RATE_LIMIT: 1000
    depends_on:
      mock-provider:
        condition: service_healthy

  worker:
    environment:
      DENO_ENV: test
      OPENAI_TEST_ALLOW_HTTP_HOST: mock-provider
      KNOWLEDGE_EMBEDDING_BASE_URL: http://mock-provider:4010/v1
      KNOWLEDGE_EMBEDDING_API_KEY: ci-mock-provider-key
      KNOWLEDGE_EMBEDDING_MODEL: mock-embedding
      KNOWLEDGE_EMBEDDING_UPSTREAM_MODEL: mock-embedding
      KNOWLEDGE_EMBEDDING_VERSION: mock-embedding-v1
      KNOWLEDGE_EMBEDDING_BATCH_SIZE: "64"
      KNOWLEDGE_EMBEDDING_INPUT_MICROS_PER_MILLION: "1000000"
      KNOWLEDGE_EMBEDDING_FIXED_CALL_MICROS: "5"
    depends_on:
      mock-provider:
        condition: service_healthy

  mock-provider:
    image: denoland/deno:alpine
    # Contract stacks are intentionally durable across a container-runtime restart, just like the
    # app that depends on this provider. A test-only dependency must not remain exited while the
    # rest of the stack recovers.
    restart: unless-stopped
    working_dir: /tests
    command:
      [
        "run",
        "--allow-net",
        "--allow-env=MOCK_PROVIDER_PORT,MOCK_PROVIDER_API_KEY,MOCK_PROVIDER_CONTROL_TOKEN",
        "mock-provider.ts",
      ]
    environment:
      MOCK_PROVIDER_API_KEY: ci-mock-provider-key
      MOCK_PROVIDER_CONTROL_TOKEN: ci-mock-control-token
    volumes:
      - ./tests/mock-provider.ts:/tests/mock-provider.ts:ro
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "deno",
          "eval",
          "fetch('http://127.0.0.1:4010/health').then(r=>{if(!r.ok)Deno.exit(1)}).catch(()=>Deno.exit(1))",
        ]
      interval: 3s
      timeout: 2s
      retries: 20
