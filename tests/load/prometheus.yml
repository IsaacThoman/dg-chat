global:
  scrape_interval: 1s
  scrape_timeout: 750ms
  evaluation_interval: 1s

scrape_configs:
  - job_name: dg-chat-api
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["api-metrics"]
        type: A
        port: 9090
        refresh_interval: 1s
  - job_name: dg-chat-worker
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["worker-metrics"]
        type: A
        port: 9091
        refresh_interval: 1s
